    <!DOCTYPE html>
    <html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>صفحه ساده من</title>
        <style>
            body {
                font-family: 'Tahoma', sans-serif;
                line-height: 1.6;
                margin: 40px;
                background-color: #f4f4f4;
                color: #333;
                text-align: right; /* راست‌چین کردن متن */
            }
            .container {
                max-width: 800px;
                margin: auto;
                background: #fff;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            h1 {
                color: #0056b3;
            }
            img {
                max-width: 100%;
                height: auto;
                display: block; /* برای اینکه عکس خودش یک بلاک باشه و وسط چین بشه */
                margin: 20px auto; /* وسط چین کردن عکس */
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>به صفحه ساده من خوش آمدید!</h1>

            <p>اینجا می‌توانید متن‌های خودتان را بنویسید. این یک مثال برای متن اصلی صفحه است که درباره موضوع مورد نظرتان توضیح می‌دهد.</p>

            <!-- اینجا عکس خود را قرار دهید -->
            <!-- مطمئن شوید که عکس را در کنار این فایل index.html یا در یک پوشه img آپلود کرده‌اید -->
            <img src="your-image.jpg" alt="توضیح عکس">

            <p>متن بیشتری را می‌توانید در اینجا اضافه کنید. این بخش برای جزئیات بیشتر یا معرفی موارد دیگر است.</p>

            <!-- اگر عکس دیگری دارید -->
            <!-- <img src="another-image.png" alt="توضیح عکس دوم"> -->
        </div>
    </body>
    </html>
